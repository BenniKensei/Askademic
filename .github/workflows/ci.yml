name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    # Spin up the pgvector database for Spring Boot to connect to during tests
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: askademy_user
          POSTGRES_PASSWORD: askademy_password
          POSTGRES_DB: askademy
        ports:
          - 5431:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend
        
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Initialize pgvector extension
        env:
          PGPASSWORD: askademy_password
        run: |
          psql -h localhost -p 5431 -U askademy_user -d askademy -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run tests
        run: mvn test -B --no-transfer-progress

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
